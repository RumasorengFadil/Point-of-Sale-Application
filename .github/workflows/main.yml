name: Deploy Laravel

on:
  push:
    branches:
      - main
      - staging
      - dev
      
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, pdo, pdo_mysql, bcmath, ctype, fileinfo, json, openssl, tokenizer, xml
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Frontend Assets
        run: npm run build

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Server
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            DEPLOY_PATH="${{ secrets.PROD_PATH }}"
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            DEPLOY_PATH="${{ secrets.STAGING_PATH }}"
          else
            DEPLOY_PATH="${{ secrets.DEV_PATH }}"
          fi

          echo "Deploying to $DEPLOY_PATH"

          ssh -p 6510 -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
          "mkdir -p $DEPLOY_PATH"

          rsync -az --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude=".env" \
            -e "ssh -p 6510 -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:$DEPLOY_PATH

          ssh -p 6510 -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << EOF

            cd $DEPLOY_PATH

            composer install --no-dev --optimize-autoloader

            php artisan migrate --force

            php artisan config:clear
            php artisan route:clear
            php artisan view:clear

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            php artisan storage:link || true

            php artisan optimize

          EOF

